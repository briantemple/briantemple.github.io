<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SF Restaurant Watchlist</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0f;
      --surface: #17171a;
      --surface-hover: #1f1f23;
      --surface2: #26262b;
      --border: #2a2a2f;
      --border-strong: #3a3a40;
      --text: #f0f0f5;
      --text-secondary: #9898a6;
      --text-muted: #55555f;
      --green: #30d158;
      --green-dim: rgba(48, 209, 88, 0.10);
      --green-border: rgba(48, 209, 88, 0.45);
      --red: #ff453a;
      --orange: #ff9f0a;
      --blue: #0a84ff;
      --pink: #ff375f;
      --accent: #636aff;
      --radius: 10px;
      --radius-sm: 6px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }

    /* ── Loading overlay ── */
    .loading-overlay {
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
    }
    .loading-overlay.hidden { display: none; }
    .spinner {
      width: 24px;
      height: 24px;
      border: 2.5px solid var(--border-strong);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 13px; color: var(--text-muted); }

    /* ── PAT warning banner ── */
    .pat-banner {
      background: rgba(255, 159, 10, 0.10);
      border-bottom: 1px solid rgba(255, 159, 10, 0.30);
      padding: 8px 24px;
      font-size: 12px;
      color: var(--orange);
      text-align: center;
    }
    .pat-banner.hidden { display: none; }

    /* ── Saved indicator ── */
    .saved-indicator {
      font-size: 12px;
      color: var(--green);
      opacity: 0;
      transition: opacity 0.3s;
      white-space: nowrap;
    }
    .saved-indicator.visible { opacity: 1; }

    /* ── Error toast ── */
    .error-toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: rgba(255, 69, 58, 0.15);
      border: 1px solid rgba(255, 69, 58, 0.40);
      color: var(--red);
      padding: 10px 18px;
      border-radius: var(--radius);
      font-size: 13px;
      z-index: 300;
      transition: transform 0.25s ease;
      white-space: nowrap;
    }
    .error-toast.visible { transform: translateX(-50%) translateY(0); }

    /* ── Header ── */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 18px 24px 14px;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(12px);
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    h1 {
      font-size: 17px;
      font-weight: 700;
      letter-spacing: -0.4px;
      color: var(--text);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .stats {
      font-size: 12px;
      color: var(--text-muted);
    }

    .copy-btn {
      background: var(--green);
      color: #000;
      border: none;
      padding: 7px 14px;
      border-radius: var(--radius-sm);
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      letter-spacing: 0.1px;
      transition: opacity 0.15s;
    }
    .copy-btn:hover { opacity: 0.82; }
    .copy-btn:active { opacity: 0.7; }

    /* ── Filters ── */
    .filters {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .filter-tabs {
      display: flex;
      gap: 3px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 3px;
    }

    .filter-tab {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 5px 10px;
      border: none;
      border-radius: 4px;
      background: transparent;
      color: var(--text-secondary);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.13s;
      white-space: nowrap;
    }
    .filter-tab:hover { color: var(--text); background: var(--surface2); }
    .filter-tab.active {
      background: var(--surface2);
      color: var(--text);
    }

    .count-badge {
      background: var(--surface2);
      color: var(--text-muted);
      font-size: 10px;
      font-weight: 700;
      min-width: 17px;
      height: 17px;
      padding: 0 4px;
      border-radius: 8px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .filter-tab.active .count-badge {
      background: var(--border-strong);
      color: var(--text-secondary);
    }

    .search-wrap { margin-left: auto; }

    .search {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 12px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      width: 200px;
      outline: none;
      transition: border-color 0.15s;
    }
    .search:focus { border-color: var(--accent); }
    .search::placeholder { color: var(--text-muted); }

    /* ── Main ── */
    .main {
      padding: 18px 24px 40px;
      max-width: 1440px;
      margin: 0 auto;
    }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      align-items: start;
    }
    @media (max-width: 1200px) { .grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 840px)  { .grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 500px)  {
      .grid { grid-template-columns: 1fr; }
      .header { padding: 14px 16px 12px; }
      .main { padding: 14px 14px 40px; }
      .search { width: 160px; }
    }

    .empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
      font-size: 14px;
    }

    /* ── Cards ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: border-color 0.15s;
      display: flex;
      flex-direction: column;
    }
    .card:hover { border-color: var(--border-strong); }

    .card.status-approved {
      border-color: var(--green-border);
      background: linear-gradient(180deg, var(--green-dim) 0%, var(--surface) 56px);
    }

    .card.status-removed {
      opacity: 0.38;
    }
    .card.status-removed:hover { opacity: 0.65; }

    /* Card header – clickable */
    .card-header {
      padding: 12px 13px 8px;
      cursor: pointer;
      user-select: none;
    }
    .card-header:hover .card-name { color: var(--accent); }

    .card-name {
      font-size: 13px;
      font-weight: 600;
      line-height: 1.35;
      color: var(--text);
      transition: color 0.13s;
      margin-bottom: 4px;
    }
    .status-removed .card-name {
      text-decoration: line-through;
      color: var(--text-muted);
    }

    .card-neighborhood {
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 5px;
    }

    .card-badges {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
    }

    .badge {
      font-size: 10px;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 4px;
      letter-spacing: 0.4px;
      text-transform: uppercase;
    }

    .source-eater       { background: rgba(255, 159, 10, 0.14); color: var(--orange); }
    .source-infatuation { background: rgba(255, 55, 95, 0.14);  color: var(--pink); }
    .source-manual      { background: rgba(10, 132, 255, 0.14); color: var(--blue); }

    .status-badge { background: var(--surface2); color: var(--text-muted); }
    .status-approved .status-badge {
      background: rgba(48, 209, 88, 0.13);
      color: var(--green);
    }

    /* Detail panel */
    .card-detail {
      padding: 10px 13px;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      background: rgba(0,0,0,0.3);
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .detail-row {
      display: flex;
      gap: 8px;
      font-size: 12px;
      align-items: baseline;
    }

    .detail-label {
      color: var(--text-muted);
      min-width: 76px;
      flex-shrink: 0;
    }

    .detail-value { color: var(--text-secondary); }

    .detail-link {
      color: var(--accent);
      text-decoration: none;
    }
    .detail-link:hover { text-decoration: underline; }

    /* Action buttons */
    .card-actions {
      display: flex;
      padding: 7px 8px 8px;
      gap: 4px;
      margin-top: auto;
    }

    .btn {
      flex: 1;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      font-size: 11px;
      padding: 5px 2px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all 0.12s;
      white-space: nowrap;
    }
    .btn:hover {
      background: var(--surface2);
      color: var(--text);
      border-color: var(--border-strong);
    }
    .btn:active { opacity: 0.75; }

    .btn-approve.active {
      background: rgba(48, 209, 88, 0.13);
      border-color: rgba(48, 209, 88, 0.4);
      color: var(--green);
    }
    .btn-remove.active {
      background: rgba(255, 69, 58, 0.12);
      border-color: rgba(255, 69, 58, 0.35);
      color: var(--red);
    }
    .btn-reset { color: var(--text-muted); }
  </style>
</head>
<body>

<div class="loading-overlay" id="loading-overlay">
  <div class="spinner"></div>
  <div class="loading-text">Loading state…</div>
</div>

<div class="pat-banner hidden" id="pat-banner">⚠️ PAT not configured — changes will not be saved</div>

<header class="header">

      <button class="filter-tab" id="filter-removed">Removed <span class="count-badge" id="count-removed">0</span></button>
    </div>
    <div class="search-wrap">
      <input type="search" class="search" id="search" placeholder="Search restaurants…" autocomplete="off">
    </div>
  </div>
</header>

<main class="main">
  <div class="grid" id="grid"></div>
</main>

<div class="error-toast" id="error-toast"></div>

// ── GitHub persistence ──────────────────────────────────────────────────────
const GITHUB_API_URL = 'https://api.github.com/repos/briantemple/reservations/contents/state.json';
const STORAGE_KEY = 'reservations-v1';

let githubSha = null;
let saveInFlight = false;
let pendingSave = false;
let saveDebounceTimer = null;
let preflightState = null;
let savedIndicatorTimer = null;
let errorToastTimer = null;

// ── App state ───────────────────────────────────────────────────────────────
let state = {};
let activeFilter = 'all';
let searchQuery = '';
let expandedId = null;

// ── GitHub load / save ──────────────────────────────────────────────────────
function patConfigured() {
  return GITHUB_PAT !== 'GITHUB_PAT_PLACEHOLDER';
}

async function loadState() {
  document.getElementById('loading-overlay').classList.remove('hidden');

  if (!patConfigured()) {
    document.getElementById('pat-banner').classList.remove('hidden');
    try {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) state = JSON.parse(saved);
    } catch (_) {}
    document.getElementById('loading-overlay').classList.add('hidden');
    render();
    return;
  }

  try {
    const resp = await fetch(GITHUB_API_URL, {
      headers: {
        'Authorization': `token ${GITHUB_PAT}`,
        'Accept': 'application/vnd.github.v3+json'
      }
    });
    if (!resp.ok) throw new Error(`GitHub API ${resp.status}`);
    const data = await resp.json();
    githubSha = data.sha;
    state = JSON.parse(atob(data.content.replace(/\s/g, '')));
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch (_) {
    try {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) state = JSON.parse(saved);
    } catch (_2) {}
  }

  document.getElementById('loading-overlay').classList.add('hidden');
  render();
}

function scheduleSave() {
  if (!patConfigured()) return;
  clearTimeout(saveDebounceTimer);
  saveDebounceTimer = setTimeout(executeSave, 300);
}

async function executeSave() {
  if (saveInFlight) {
    pendingSave = true;
    return;
  }

  saveInFlight = true;
  pendingSave = false;
  preflightState = Object.assign({}, state);

  try {
    const body = {
      message: 'Update state',
      content: btoa(JSON.stringify(state))
    };
    if (githubSha) body.sha = githubSha;

    const resp = await fetch(GITHUB_API_URL, {
      method: 'PUT',
      headers: {
        'Authorization': `token ${GITHUB_PAT}`,
        'Accept': 'application/vnd.github.v3+json',
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(body)
    });

    if (!resp.ok) throw new Error(`GitHub API ${resp.status}`);

    const data = await resp.json();
    githubSha = data.content.sha;

    const indicator = document.getElementById('saved-indicator');
    indicator.classList.add('visible');
    clearTimeout(savedIndicatorTimer);
    savedIndicatorTimer = setTimeout(() => indicator.classList.remove('visible'), 2000);
  } catch (_) {
    state = preflightState;
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));

    const toast = document.getElementById('error-toast');
    toast.textContent = 'Save failed — changes reverted';
    toast.classList.add('visible');
    clearTimeout(errorToastTimer);
    errorToastTimer = setTimeout(() => toast.classList.remove('visible'), 3500);

    render();
  } finally {
    saveInFlight = false;
    if (pendingSave) executeSave();
  }
}

// ── Helpers ─────────────────────────────────────────────────────────────────
function escapeHtml(str) {
  if (!str) return '';
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function sourceLabel(source) {
  return { eater: 'Eater', infatuation: 'Infatuation', manual: 'Manual' }[source] || source;
}

function getStatus(id) {
  return state[id] || 'unapproved';
}

function setStatus(id, status) {
  if (status === 'unapproved') {
    delete state[id];
  } else {
    state[id] = status;
  }
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  render();
  scheduleSave();
}

function getCounts() {
  const counts = { approved: 0, removed: 0, unapproved: 0 };
  for (const r of RAW_RESTAURANTS) {
    counts[getStatus(r.id)]++;
  }
  return counts;
}

function getFiltered() {
  return RAW_RESTAURANTS.filter(r => {
    if (activeFilter !== 'all' && getStatus(r.id) !== activeFilter) return false;
    if (searchQuery) {
      if (!r.name.toLowerCase().includes(searchQuery.toLowerCase())) return false;
    }
    return true;
  });
}

// ── Render ──────────────────────────────────────────────────────────────────
function render() {
  const counts = getCounts();

  document.getElementById('stats').textContent =
    `${counts.approved} approved · ${counts.removed} removed · ${counts.unapproved} pending`;

  document.getElementById('count-all').textContent = RAW_RESTAURANTS.length;
  document.getElementById('count-approved').textContent = counts.approved;
  document.getElementById('count-unapproved').textContent = counts.unapproved;
  document.getElementById('count-removed').textContent = counts.removed;

  ['all', 'approved', 'unapproved', 'removed'].forEach(f => {
    document.getElementById(`filter-${f}`).classList.toggle('active', activeFilter === f);
  });

  const filtered = getFiltered();
  const grid = document.getElementById('grid');

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty">No restaurants match your filters.</div>';
    return;
  }

  const fragment = document.createDocumentFragment();

  for (const r of filtered) {
    const status = getStatus(r.id);
    const isExpanded = expandedId === r.id;

    const card = document.createElement('div');
    card.className = `card status-${status}`;
    card.dataset.id = r.id;

    const detailHTML = isExpanded ? `
      <div class="card-detail">
        <div class="detail-row">
          <span class="detail-label">Source</span>
          ${r.source_url
            ? `<a href="${escapeHtml(r.source_url)}" target="_blank" rel="noopener noreferrer" class="detail-link">${sourceLabel(r.source)}</a>`
            : `<span class="detail-value">${sourceLabel(r.source)}</span>`
          }
        </div>
        ${r.neighborhood ? `<div class="detail-row"><span class="detail-label">Neighborhood</span><span class="detail-value">${escapeHtml(r.neighborhood)}</span></div>` : ''}
        ${r.quality_signal ? `<div class="detail-row"><span class="detail-label">Signal</span><span class="detail-value">${escapeHtml(r.quality_signal)}</span></div>` : ''}
        ${r.platform && r.platform !== 'unknown' ? `<div class="detail-row"><span class="detail-label">Platform</span><span class="detail-value">${escapeHtml(r.platform)}</span></div>` : ''}
        <div class="detail-row"><span class="detail-label">ID</span><span class="detail-value">#${r.id}</span></div>
      </div>` : '';

    card.innerHTML = `
      <div class="card-header">
        <div class="card-name">${escapeHtml(r.name)}</div>
        ${r.neighborhood ? `<div class="card-neighborhood">${escapeHtml(r.neighborhood)}</div>` : ''}
        <div class="card-badges">
          <span class="badge source-${r.source}">${sourceLabel(r.source)}</span>
          <span class="badge status-badge">${status}</span>
        </div>
      </div>
      ${detailHTML}
      <div class="card-actions">
        <button class="btn btn-approve${status === 'approved' ? ' active' : ''}" data-id="${r.id}" data-action="approve">✅ Approve</button>
        <button class="btn btn-remove${status === 'removed' ? ' active' : ''}" data-id="${r.id}" data-action="remove">❌ Remove</button>
        <button class="btn btn-reset" data-id="${r.id}" data-action="reset">🔄</button>
      </div>`;

    card.querySelector('.card-header').addEventListener('click', () => toggleExpand(r.id));

    fragment.appendChild(card);
  }

  grid.innerHTML = '';
  grid.appendChild(fragment);
}

function toggleExpand(id) {
  expandedId = expandedId === id ? null : id;
  render();
}

// ── Event delegation for action buttons ────────────────────────────────────
document.getElementById('grid').addEventListener('click', e => {
  const btn = e.target.closest('.btn');
  if (!btn) return;
  e.stopPropagation();
  const id = Number(btn.dataset.id);
  const action = btn.dataset.action;
  if (action === 'approve') setStatus(id, 'approved');
  else if (action === 'remove') setStatus(id, 'removed');
  else if (action === 'reset') setStatus(id, 'unapproved');
});

// ── Copy approved list ──────────────────────────────────────────────────────
document.getElementById('copy-btn').addEventListener('click', () => {
  const approved = RAW_RESTAURANTS
    .filter(r => getStatus(r.id) === 'approved')
    .map(r => r.name)
    .sort((a, b) => a.localeCompare(b))
    .join('\n');

  if (!approved) {
    alert('No restaurants approved yet.');
    return;
  }

  navigator.clipboard.writeText(approved).then(() => {
    const btn = document.getElementById('copy-btn');
    const orig = btn.textContent;
    btn.textContent = 'Copied!';
    setTimeout(() => { btn.textContent = orig; }, 2000);
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = approved;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    const btn = document.getElementById('copy-btn');
    const orig = btn.textContent;
    btn.textContent = 'Copied!';
    setTimeout(() => { btn.textContent = orig; }, 2000);
  });
});

// ── Filters & search ────────────────────────────────────────────────────────
['all', 'approved', 'unapproved', 'removed'].forEach(f => {
  document.getElementById(`filter-${f}`).addEventListener('click', () => {
    activeFilter = f;
    render();
  });
});

document.getElementById('search').addEventListener('input', e => {
  searchQuery = e.target.value;
  render();
});

// ── Boot ────────────────────────────────────────────────────────────────────
loadState();
</script>
